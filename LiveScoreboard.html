<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sheet</title>
<style>
  :root{
    --bg:#f6f7f9;
    --card:#ffffff;
    --border:#e3e6ea;
    --text:#1b1f23;
    --text-muted:#6b7280;
    --accent:#2563eb;
    --accent-soft:#eef2ff;
    --good:#16a34a;
    --bad:#dc2626;
    --row-alt:#fafbfc;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:32px 20px 60px;
  }
  header{
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    justify-content:space-between;
    gap:8px;
    margin-bottom:18px;
  }
  h1{
    font-size:22px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .meta{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--text-muted);
  }
  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--good);
    display:inline-block;
    flex-shrink:0;
  }
  .dot.error{background:var(--bad);}
  .dot.loading{background:#d1a300;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  button{
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:13px;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
  }
  button:hover{background:var(--accent-soft);border-color:var(--accent);}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .table-scroll{
    overflow-x:auto;
  }
  table{
    border-collapse:collapse;
    width:100%;
    font-size:14px;
    min-width:480px;
  }
  thead th{
    position:sticky;
    top:0;
    background:var(--accent-soft);
    color:var(--accent);
    text-align:left;
    font-weight:600;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  tbody td{
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:13.5px;
    white-space:nowrap;
  }
  tbody tr:nth-child(even){background:var(--row-alt);}
  tbody tr:hover{background:var(--accent-soft);}
  .state{
    padding:40px 20px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
  }
  .state.error{color:var(--bad);}
  footer{
    margin-top:14px;
    font-size:12px;
    color:var(--text-muted);
    text-align:right;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1 id="sheet-title">Live Sheet</h1>
    <div class="meta">
      <span class="dot loading" id="status-dot"></span>
      <span id="status-text">Loading…</span>
      <button id="refresh-btn" type="button">Refresh now</button>
    </div>
  </header>

  <div class="card">
    <div class="table-scroll" id="table-scroll">
      <div class="state" id="state-message">Loading data…</div>
    </div>
  </div>

  <footer>Auto-refreshes every 60 seconds</footer>

</div>

<script>
/* ---------------------------------------------------------------
   CONFIG — edit these three values for your own sheet
   -----------------------------------------------------------------
   1. SHEET_ID: the long ID in your sheet's URL, e.g.
      https://docs.google.com/spreadsheets/d/  >>1AbCDeFGhiJKlmNoPQRs<<  /edit
   2. SHEET_NAME: the exact name of the tab/worksheet to read (the
      label on the tab at the bottom of the sheet, e.g. "Sheet1").
   3. The Google Sheet must be shared as "Anyone with the link
      can view" (Share button, top right, in Google Sheets).
   ----------------------------------------------------------------- */
const SHEET_ID = "1wEH4vFncs8p8zAHDBDdEe4J1JO-EXe0ihtUs6N4UApM";
const SHEET_NAME = "OVERALL";
const REFRESH_MS = 60 * 1000; // 1 minute
/* ----------------------------------------------------------------- */

document.getElementById("sheet-title").textContent = SHEET_NAME;

const els = {
  scroll: document.getElementById("table-scroll"),
  dot: document.getElementById("status-dot"),
  status: document.getElementById("status-text"),
  refreshBtn: document.getElementById("refresh-btn"),
};

function setStatus(state, label) {
  els.dot.className = "dot" + (state === "ok" ? "" : " " + state);
  els.status.textContent = label;
}

function renderTable(rows) {
  if (!rows.length) {
    els.scroll.innerHTML = '<div class="state">This sheet is empty.</div>';
    return;
  }
  const [headerRow, ...bodyRows] = rows;

  const thead = `<thead><tr>${
    headerRow.map(h => `<th>${escapeHtml(h)}</th>`).join("")
  }</tr></thead>`;

  const tbody = `<tbody>${
    bodyRows.map(r =>
      `<tr>${headerRow.map((_, i) => `<td>${escapeHtml(r[i] ?? "")}</td>`).join("")}</tr>`
    ).join("")
  }</tbody>`;

  els.scroll.innerHTML = `<table>${thead}${tbody}</table>`;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function cellText(cell) {
  if (!cell) return "";
  if (cell.f !== undefined && cell.f !== null) return cell.f; // formatted value, e.g. "12.5%"
  if (cell.v === undefined || cell.v === null) return "";
  return String(cell.v);
}

const CALLBACK_NAME = "__sheetDataCallback";
let activeScript = null;
let loadTimeoutId = null;

// Google calls this directly once the script tag below finishes loading.
window[CALLBACK_NAME] = function (response) {
  clearTimeout(loadTimeoutId);

  if (response.status === "error") {
    const detail = response.errors?.[0]?.detailed_message || response.errors?.[0]?.message || "Unknown error";
    console.error("Sheet error:", detail);
    setStatus("error", "Couldn't load sheet");
    els.scroll.innerHTML =
      `<div class="state error">Google rejected the request: ${escapeHtml(detail)}. ` +
      `Double-check SHEET_ID, SHEET_NAME, and that sharing is set to "Anyone with the link can view".</div>`;
    return;
  }

  const headerRow = response.table.cols.map(c => c.label || c.id || "");
  const bodyRows = response.table.rows.map(r => headerRow.map((_, i) => cellText(r.c[i])));
  renderTable([headerRow, ...bodyRows]);

  setStatus("ok", `Updated ${new Date().toLocaleTimeString()}`);
};

function loadData() {
  setStatus("loading", "Refreshing…");

  if (activeScript) { activeScript.remove(); activeScript = null; }

  const url =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
    `?sheet=${encodeURIComponent(SHEET_NAME)}` +
    `&tqx=responseHandler:${CALLBACK_NAME}` +
    `&_=${Date.now()}`; // cache-bust so each refresh pulls fresh data

  const script = document.createElement("script");
  script.src = url;
  script.onerror = () => {
    setStatus("error", "Couldn't load sheet");
    els.scroll.innerHTML =
      `<div class="state error">Couldn't reach the sheet. Check that SHEET_ID is correct and that the ` +
      `sheet is shared as "Anyone with the link can view".</div>`;
  };
  activeScript = script;
  document.body.appendChild(script);

  clearTimeout(loadTimeoutId);
  loadTimeoutId = setTimeout(() => {
    setStatus("error", "Couldn't load sheet");
    els.scroll.innerHTML = `<div class="state error">Request timed out. Check your connection and try again.</div>`;
  }, 10000);
}

els.refreshBtn.addEventListener("click", loadData);

loadData();
setInterval(loadData, REFRESH_MS);

</script>
</body>
</html>
